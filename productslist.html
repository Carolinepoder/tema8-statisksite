<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <a href="index.html">
        <h1>FashionRUs</h1>
      </a>
      <nav class="menu">
        <a href="index.html">Women</a>
        <a href="index.html">Men</a>
        <a href="index.html">Kids</a>
      </nav>
    </header>

    <main class="grid4">
      <h2>Clothes</h2>

      <a href="product.html" class="products">
        <article class="item">
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1532.webp"
            alt="product img"
          />
          <h3>Grey Puma Tshirt</h3>
          <p>Puma</p>
          <p>DKK 299</p>
        </article>
      </a>

      <a href="product.html" class="products sale">
        <article class="item">
          <!-- vare til salg -->
          <span class="sale">-30%</span>
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1525.webp"
            alt="product img"
          />
          <h3>Black Puma Backpack</h3>
          <p>Puma</p>
          <p class="old-price">DKK 499</p>
          <p class="new-price">DKK 349</p>
        </article>
      </a>

      <a href="product.html" class="products sold-out">
        <article class="item">
          <!-- udsolgt vare -->
          <span class="soldout">Sold Out</span>
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1164.webp"
            alt="product img"
          />
          <h3>Blue Football Tshirt</h3>
          <p>Nike</p>
          <p>DKK 699</p>
        </article>
      </a>

      <a href="product.html" class="products">
        <article class="item">
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1165.webp"
            alt="product img"
          />
          <h3>Black Cardigan</h3>
          <p>H&M</p>
          <p>DKK 299</p>
        </article>
      </a>
    </main>

    <footer></footer>
  </body>
</html>
